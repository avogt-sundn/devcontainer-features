name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - opencode
          - vertex-auth
          - build-mirrors
          - devtools
        include:
          - feature: quarkus
            base-image: mcr.microsoft.com/devcontainers/java:dev-25-jdk-bookworm
          - feature: springboot-cli
            base-image: mcr.microsoft.com/devcontainers/java:dev-25-jdk-bookworm
          - feature: playwright
            base-image: mcr.microsoft.com/devcontainers/javascript-node:22
          - feature: claude-code
            base-image: mcr.microsoft.com/devcontainers/javascript-node:22
          - feature: copilot-cli
            base-image: mcr.microsoft.com/devcontainers/javascript-node:22
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install --location=global @devcontainers/cli

      - name: Test ${{ matrix.feature }}
        run: devcontainer features test -f ${{ matrix.feature }} --skip-scenarios --base-image ${{ matrix.base-image || 'mcr.microsoft.com/devcontainers/base:ubuntu' }} .
