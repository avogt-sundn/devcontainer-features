name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - opencode
          - vertex-auth
          - build-mirrors
          - quarkus
          - springboot-cli
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install --location=global @devcontainers/cli

      - name: Test ${{ matrix.feature }}
        run: devcontainer features test -f ${{ matrix.feature }} --skip-scenarios --base-image mcr.microsoft.com/devcontainers/base:ubuntu .

      - name: Test ${{ matrix.feature }} scenarios
        run: devcontainer features test -f ${{ matrix.feature }} --skip-autogenerated --skip-duplicated --base-image mcr.microsoft.com/devcontainers/base:ubuntu .
