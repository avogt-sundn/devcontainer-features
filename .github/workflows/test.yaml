name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - opencode
          - vertex-auth
    steps:
      - uses: actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install --location=global @devcontainers/cli

      - name: Test ${{ matrix.feature }}
        run: devcontainer features test -f ${{ matrix.feature }} --skip-scenarios .
