<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"
     font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow-primary" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#007a99"/>
    </marker>
    <marker id="arrow-neutral" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <style>
      .title        { font-size: 18px; font-weight: bold;   fill: #ffffff; }
      .subtitle     { font-size: 12px;                      fill: #e0f4f8; }
      .section-title{ font-size: 14px; font-weight: bold;   fill: #007a99; }
      .label        { font-size:  9px;                      fill: #666;    }
      .body         { font-size: 11px;                      fill: #444;    }
      .code         { font-size: 10px; font-family: 'Cascadia Code','Courier New',monospace; fill: #1a1a2e; }
      .badge        { font-size:  9px; font-weight: bold;   fill: #ffffff; }
      .hint         { font-size:  9px;                      fill: #888;    }
    </style>
  </defs>

  <!-- Globaler Hintergrund -->
  <rect width="800" height="400" fill="#f4f8fb"/>

  <!--
    Diagramm-Inhalt hier einfügen.
    Styleguide: grafiken/STYLEGUIDE.md
    Farbpalette:
      Primär:          #007a99  (Hauptboxen, Header)
      Primär dunkel:   #005f73  (Abschnitts-Header)
      Primär hell:     #e0f4f8  (Box-Hintergrund)
      Orange:          #e07b00  (POST, Schreiben)
      Orange hell:     #fff8ee  (Box-Hintergrund)
      Grün:            #27ae60  (GET, Erfolg)
      Grün hell:       #f0fff4  (Box-Hintergrund)
      Rot:             #c0392b  (Fehler, destruktiv)
      Text:            #1a1a2e / #444 / #888
      Border:          #ddd
    Geometrie:
      rx="6" (inline), rx="8" (Hauptkarte)
      stroke-width="1.5" (Hauptbox), "1" (Divider)
  -->

</svg>
